<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Text Snapper</title>
  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }

    /* Light theme (default) */
    body {
      width: 370px;
      height: 600px;
      /* use height instead of max-height */
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, 'Helvetica Neue', Arial, sans-serif;
      background: linear-gradient(135deg, #f5f7fa 0%, #c3cfe2 100%);
      color: #333;
      overflow: hidden;
      /* prevent body from scrolling */
    }

    .container {
      display: flex;
      flex-direction: column;
      height: 100%;
      background: white;
      overflow: hidden;
      /* keep scrolling inside content only */
    }

    .header {
      background: #783393;
      color: white;
      padding: 15px 25px;
      display: flex;
      justify-content: space-between;
      align-items: center;

      flex-shrink: 0;
      /* important: header stays fixed height */
      position: sticky;
      /* optional but good */
      top: 0;
      z-index: 10;
      border-bottom: #b6b6b67a 1px solid;
    }

    .content {
      flex: 1;
      overflow-y: auto;
      padding: 16px 20px;
      min-height: 0;
      /* important in flex layouts */
    }

    .header h1 {
      color: #4A205B;
      font-size: 18px;
      font-weight: 600;
      display: flex;
      align-items: center;
      gap: 8px;
    }

    .header-icon {
      width: 40px;
      height: 40px;
      display: block;
    }

    .controls {
      display: flex;
      gap: 8px;
      align-items: center;
      flex-wrap: wrap;
      margin-left: auto;
      visibility: hidden;
    }

    .controls.ready {
      visibility: visible;
    }

    .export-controls {
      display: flex;
      gap: 4px;
      align-items: center;
    }


    button {
      padding: 8px 12px;
      border: none;
      border-radius: 6px;
      font-size: 13px;
      font-weight: 500;
      cursor: pointer;
      transition: all 0.2s ease;
    }

    .btn-snap {
      background: #ef4581be;
      color: #F1F1F2;
      padding: 10px 16px;
      font-size: 14px;
      font-weight: 600;
      display: inline-flex;
      align-items: center;
      gap: 8px;
      visibility: hidden;
    }

    .btn-snap:hover {
      background: #DB3F78;
    }

    .btn-snap.ready {
      visibility: visible;
    }


    .btn-icon {
      width: 20px;
      height: 20px;
      display: block;
      flex-shrink: 0;
    }

    .btn-snap:active {
      transform: translateY(0);
    }

    .btn-snap.loading {
      opacity: 0.7;
      pointer-events: none;
    }

    button:disabled,
    .btn-small:disabled,
    .dropdown-toggle:disabled {
      opacity: 0.5;
      cursor: not-allowed;
      pointer-events: none;
    }

    .btn-secondary {
      background: #e5e7eb;
      color: #374151;
      padding: 6px 10px;
      font-size: 12px;
    }

    .btn-secondary:hover {
      background: #d1d5db;
    }

    .btn-danger {
      background: #ef4444;
      color: white;
      padding: 6px 10px;
      font-size: 12px;
    }

    .btn-danger:hover {
      background: #dc2626;
    }

    .empty-state {
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      height: 100%;
      color: #9ca3af;
      text-align: center;
    }

    .sleepy-icon {
      width: 160px;
      height: 160px;
      display: block;
    }

    .empty-icon {
      font-size: 48px;
      margin-bottom: 12px;
      opacity: 0.5;
    }

    .empty-state p {
      font-size: 14px;
      margin-bottom: 4px;
    }

    .empty-state small {
      font-size: 12px;
      color: #d1d5db;
    }

    .snapshot-item {
      background: #ffffff;
      border: 1px solid #e5e7eb;
      border-radius: 8px;
      padding: 12px;
      margin-bottom: 12px;
      transition: all 0.2s ease;
    }

    .snapshot-item-active {
      border-color: #F27C21;

      background: #fff7f1;
    }

    .snapshot-item:hover {
      background: #f27c213b;
      border-color: #d1d5db;

    }

    .snapshot-header {
      display: flex;
      justify-content: space-between;
      align-items: flex-start;
      margin-bottom: 8px;
    }

    .snapshot-title {
      font-weight: 600;
      font-size: 13px;
      color: #1f2937;
      flex: 1;
      word-break: break-word;
      margin-right: 8px;
    }

    .snapshot-time {
      font-size: 11px;
      color: #9ca3af;
      white-space: nowrap;
    }

    .snapshot-url {
      font-size: 11px;
      color: #667eea;
      text-decoration: none;
      word-break: break-all;
      display: inline-block;
      margin-bottom: 8px;
      max-width: 100%;
      overflow: hidden;
      text-overflow: ellipsis;
      white-space: nowrap;
    }

    .snapshot-url:hover {
      text-decoration: underline;
    }

    .snapshot-preview {
      font-size: 12px;
      color: #6b7280;
      background: rgba(255, 255, 255, 0.329);
      padding: 8px;
      border-radius: 4px;
      border-left: 3px solid #F27C21;
      margin-bottom: 8px;
      max-height: 60px;
      overflow: hidden;
      line-height: 1.4;
    }

    .dropdown {
      position: relative;
    }

    .dropdown-toggle {
      min-width: 84px;
    }

    .dropdown-menu {
      display: none;
      position: absolute;
      top: calc(100% + 6px);
      left: 0;
      background: white;
      border: 1px solid #e5e7eb;
      border-radius: 8px;

      min-width: 120px;
      overflow: hidden;
      z-index: 100;
    }

    .dropdown-menu.show {
      display: block;
    }

    .dropdown-item {
      width: 100%;
      border: none;
      background: #72278f;
      color: white;
      padding: 10px 12px;
      text-align: left;
      font-size: 14px;
      font-weight: 600;
      display: inline-flex;
      border-radius: 0;
      cursor: pointer;
    }

    .dropdown-item:hover {
      background: #DB3F78;
    }

    .snapshot-actions {
      display: flex;
      gap: 6px;
      justify-content: right;
    }

    .btn-small {
      padding: 6px 8px;
      font-size: 11px;
      border-radius: 4px;
      border: none;
      cursor: pointer;
      transition: all 0.2s ease;
    }

    .btn-copy,
    .btn-delete {
      background: transparent;
      color: #6b7280;
    }

    .dropdown-toggle {
      background: transparent;
      color: white;
    }


    .btn-icon-item {
      width: 16px;
      height: 16px;
      display: block;
    }

    .btn-delete:hover {
      color: #ffffffb6;
    }

    .top-actions {
      display: flex;
      justify-content: right;
      align-items: right;
      gap: 5px;
      padding: 5px 20px;
      background: #72278f;
      flex-shrink: 0;

    }

    .top-action-btn {
      min-width: 24px;
      justify-content: right;
      align-items: center;
      text-align: center;
      font-size: 14px;
      font-weight: 600;
      display: inline-flex;

      color: white;
    }

    .toast {
      position: fixed;
      bottom: 16px;
      right: 16px;
      background: #10b981;
      color: white;
      padding: 12px 16px;
      border-radius: 6px;
      font-size: 13px;

      animation: slideIn 0.3s ease;
      z-index: 1000;
    }

    .toast.error {
      background: #ef4444;
    }

    @keyframes slideIn {
      from {
        transform: translateX(400px);
        opacity: 0;
      }

      to {
        transform: translateX(0);
        opacity: 1;
      }
    }

    .stats {
      background: #ffffff;
      color: #9ca3af;
      align-items: center;
      text-align: center;
      padding: 10px 25px;
      font-size: 13px;
    }

    .stats strong {
      font-weight: 600;
    }

    .storage-info {
      background: #f3f4f6;
      border: 1px solid #e5e7eb;
      border-radius: 6px;
      padding: 10px 12px;
      margin-bottom: 12px;
      font-size: 12px;
      color: #6b7280;
      display: flex;
      justify-content: space-between;
      align-items: center;
    }

    .storage-info-text {
      flex: 1;
    }

    .btn-open-storage {
      background: #3b82f6;
      color: white;
      padding: 4px 8px;
      font-size: 11px;
      border-radius: 4px;
      border: none;
      cursor: pointer;
      white-space: nowrap;
      margin-left: 8px;
      transition: all 0.2s ease;
    }

    .btn-open-storage:hover {
      background: #2563eb;
    }

    .token-limit-control {
      display: flex;
      align-items: center;
      gap: 6px;
      background: white;
      border: 1px solid #d1d5db;
      border-radius: 6px;
      padding: 4px 8px;
    }

    .token-limit-control label {
      font-size: 11px;
      color: #6b7280;
      white-space: nowrap;
    }

    .token-limit-control input {
      width: 60px;
      padding: 4px 6px;
      border: 1px solid #e5e7eb;
      border-radius: 4px;
      font-size: 11px;
      text-align: center;
    }

    .token-limit-control input:focus {
      outline: none;
      border-color: #667eea;

    }

    .modal-overlay {
      display: none;
      position: fixed;
      top: 0;
      left: 0;
      right: 0;
      bottom: 0;
      background: rgba(0, 0, 0, 0.5);
      z-index: 999;
      align-items: center;
      justify-content: center;
    }

    .modal-overlay.active {
      display: flex;
    }

    .modal-content {
      background: white;
      border-radius: 8px;
      padding: 24px;
      max-width: 400px;

    }

    .modal-content h2 {
      font-size: 16px;
      margin-bottom: 12px;
      color: #1f2937;
    }

    .modal-content p {
      font-size: 13px;
      color: #6b7280;
      margin-bottom: 16px;
      line-height: 1.5;
    }

    .modal-content input {
      width: 100%;
      border: 1px solid #d1d5db;
      border-radius: 6px;
      font-size: 13px;
      margin-bottom: 16px;
    }

    .modal-content input:focus {
      outline: none;
      border-color: #667eea;

    }

    .modal-buttons {
      display: flex;
      gap: 8px;
      justify-content: flex-end;
    }

    .modal-buttons button {
      padding: 8px 16px;
      border: none;
      border-radius: 6px;
      font-size: 13px;
      cursor: pointer;
      transition: all 0.2s ease;
    }

    .modal-buttons .btn-cancel {
      background: #e5e7eb;
      color: #374151;
    }

    .modal-buttons .btn-cancel:hover {
      background: #d1d5db;
    }

    .modal-buttons .btn-confirm {
      background: #667eea;
      color: white;
    }

    .modal-buttons .btn-confirm:hover {
      background: #5a67d8;
    }

    ::-webkit-scrollbar {
      width: 6px;
    }

    ::-webkit-scrollbar-track {
      background: #f3f4f6;
    }

    ::-webkit-scrollbar-thumb {
      background: #d1d5db;
      border-radius: 3px;
    }

    ::-webkit-scrollbar-thumb:hover {
      background: #9ca3af;
    }

    @media (prefers-color-scheme: dark) {

      .btn-copy,
      .btn-delete {
        color: #ffffff;
      }


      .btn-snap {
        background: #A55417;
      }

      .btn-snap:hover {
        background: #793f12;
      }

      .btn-copy:hover,
      .btn-delete:hover {
        color: #ffffff;
      }

      body {
        background: #111111;
        color: #e5e5e5;
      }

      .container {
        background: #171717;
      }

      .header {
        background: #111111;

      }

      .top-actions {
        background: #111111;
      }

      .snapshot-item {
        background: #222222;
        border-color: #222222;
      }

      .snapshot-item-active {
        border-color: #f97316;

        background: #1e1a0f;
      }

      .snapshot-item:hover {
        background: #252525;
        border-color: #3a3a3a;
      }

      .snapshot-title {
        color: #e5e7eb;
      }

      .snapshot-time {
        color: #9ca3af;
      }

      .snapshot-url {
        color: #93c5fd;
      }

      .snapshot-preview {
        color: #cbd5e1;
        background: rgba(30, 41, 59, 0.5);
        border-left-color: #f97316;
      }

      .dropdown-menu {
        background: #1c1c1c;
        border-color: #2f2f2f;
      }

      .dropdown-item {
        background: #2b2b2b;
        border-color: #2f2f2f;
      }

      .dropdown-item:hover {
        background: #3f3f46;
      }

      .stats {
        background: #111111;
        color: #a3a3a3;
      }

      .modal-content {
        background: #1c1c1c;
      }

      .token-limit-control input,
      .modal-content input {
        background: #111111;
        border-color: #2f2f2f;
        color: #e5e5e5;
      }

      ::-webkit-scrollbar-track {
        background: #111111;
      }

      ::-webkit-scrollbar-thumb {
        background: #3f3f46;
      }

      ::-webkit-scrollbar-thumb:hover {
        background: #52525b;
      }
    }
  </style>
</head>

<body>
  <div class="container">
    <div class="header">
      <h1>
        <img src="assets/sleepy_mane.png" alt="mane" class="header-icon" id="popIcon" />
      </h1>
      <div class="controls">

        <button class="btn-small btn-copy top-action-btn" id="copyPageBtn" aria-label="Copy current page"
          title="Copy current page">
          <svg width="32px" height="32px" viewBox="0 0 24 24" fill="none" xmlns="http://www.w3.org/2000/svg">
            <path
              d="M9 9.75C9 8.50736 10.0074 7.5 11.25 7.5H16.5C17.7426 7.5 18.75 8.50736 18.75 9.75V15C18.75 16.2426 17.7426 17.25 16.5 17.25H11.25C10.0074 17.25 9 16.2426 9 15V9.75Z"
              stroke="#ffffff" stroke-width="1" stroke-linecap="round" stroke-linejoin="round" />
            <path
              d="M6.75 14.25H6C4.75736 14.25 3.75 13.2426 3.75 12V6.75C3.75 5.50736 4.75736 4.5 6 4.5H11.25C12.4926 4.5 13.5 5.50736 13.5 6.75V7.5"
              stroke="#ffffff" stroke-width="1" stroke-linecap="round" stroke-linejoin="round" />
          </svg>
        </button>

        <button class="btn-snap" id="snapBtn">
          <span id="snapText">Manemark</span>
          <img src="assets/bookmark.svg" alt="" class="btn-icon">

        </button>

      </div>
    </div>

    <div class="top-actions">

      <button class="btn-small btn-copy top-action-btn" id="importBtn">
        <svg width="24px" height="24px" viewBox="0 0 24 24" fill="none" xmlns="http://www.w3.org/2000/svg">
          <path
            d="M12.5535 2.49392C12.4114 2.33852 12.2106 2.25 12 2.25C11.7894 2.25 11.5886 2.33852 11.4465 2.49392L7.44648 6.86892C7.16698 7.17462 7.18822 7.64902 7.49392 7.92852C7.79963 8.20802 8.27402 8.18678 8.55352 7.88108L11.25 4.9318V16C11.25 16.4142 11.5858 16.75 12 16.75C12.4142 16.75 12.75 16.4142 12.75 16V4.9318L15.4465 7.88108C15.726 8.18678 16.2004 8.20802 16.5061 7.92852C16.8118 7.64902 16.833 7.17462 16.5535 6.86892L12.5535 2.49392Z"
            fill="#ffffff" />
          <path
            d="M3.75 15C3.75 14.5858 3.41422 14.25 3 14.25C2.58579 14.25 2.25 14.5858 2.25 15V15.0549C2.24998 16.4225 2.24996 17.5248 2.36652 18.3918C2.48754 19.2919 2.74643 20.0497 3.34835 20.6516C3.95027 21.2536 4.70814 21.5125 5.60825 21.6335C6.47522 21.75 7.57754 21.75 8.94513 21.75H15.0549C16.4225 21.75 17.5248 21.75 18.3918 21.6335C19.2919 21.5125 20.0497 21.2536 20.6517 20.6516C21.2536 20.0497 21.5125 19.2919 21.6335 18.3918C21.75 17.5248 21.75 16.4225 21.75 15.0549V15C21.75 14.5858 21.4142 14.25 21 14.25C20.5858 14.25 20.25 14.5858 20.25 15C20.25 16.4354 20.2484 17.4365 20.1469 18.1919C20.0482 18.9257 19.8678 19.3142 19.591 19.591C19.3142 19.8678 18.9257 20.0482 18.1919 20.1469C17.4365 20.2484 16.4354 20.25 15 20.25H9C7.56459 20.25 6.56347 20.2484 5.80812 20.1469C5.07435 20.0482 4.68577 19.8678 4.40901 19.591C4.13225 19.3142 3.9518 18.9257 3.85315 18.1919C3.75159 17.4365 3.75 16.4354 3.75 15Z"
            fill="#ffffff" />
        </svg>
      </button>

      <div class="dropdown">
        <button class="btn-small top-action-btn dropdown-toggle" id="exportMenuBtn">
          <svg width="24px" height="24px" viewBox="0 0 24 24" fill="none" xmlns="http://www.w3.org/2000/svg">
            <path
              d="M12.5535 16.5061C12.4114 16.6615 12.2106 16.75 12 16.75C11.7894 16.75 11.5886 16.6615 11.4465 16.5061L7.44648 12.1311C7.16698 11.8254 7.18822 11.351 7.49392 11.0715C7.79963 10.792 8.27402 10.8132 8.55352 11.1189L11.25 14.0682V3C11.25 2.58579 11.5858 2.25 12 2.25C12.4142 2.25 12.75 2.58579 12.75 3V14.0682L15.4465 11.1189C15.726 10.8132 16.2004 10.792 16.5061 11.0715C16.8118 11.351 16.833 11.8254 16.5535 12.1311L12.5535 16.5061Z"
              fill="#ffffff" />
            <path
              d="M3.75 15C3.75 14.5858 3.41422 14.25 3 14.25C2.58579 14.25 2.25 14.5858 2.25 15V15.0549C2.24998 16.4225 2.24996 17.5248 2.36652 18.3918C2.48754 19.2919 2.74643 20.0497 3.34835 20.6516C3.95027 21.2536 4.70814 21.5125 5.60825 21.6335C6.47522 21.75 7.57754 21.75 8.94513 21.75H15.0549C16.4225 21.75 17.5248 21.75 18.3918 21.6335C19.2919 21.5125 20.0497 21.2536 20.6517 20.6516C21.2536 20.0497 21.5125 19.2919 21.6335 18.3918C21.75 17.5248 21.75 16.4225 21.75 15.0549V15C21.75 14.5858 21.4142 14.25 21 14.25C20.5858 14.25 20.25 14.5858 20.25 15C20.25 16.4354 20.2484 17.4365 20.1469 18.1919C20.0482 18.9257 19.8678 19.3142 19.591 19.591C19.3142 19.8678 18.9257 20.0482 18.1919 20.1469C17.4365 20.2484 16.4354 20.25 15 20.25H9C7.56459 20.25 6.56347 20.2484 5.80812 20.1469C5.07435 20.0482 4.68577 19.8678 4.40901 19.591C4.13225 19.3142 3.9518 18.9257 3.85315 18.1919C3.75159 17.4365 3.75 16.4354 3.75 15Z"
              fill="#ffffff" />
          </svg> ▾
        </button>
        <div class="dropdown-menu" id="exportMenu">
          <button class="dropdown-item" id="exportJsonBtn">JSON</button>
          <button class="dropdown-item" id="exportZipBtn">ZIP</button>
        </div>
      </div>

      <button class="btn-small btn-delete top-action-btn" id="clearAllBtn">
        <svg width="24px" height="24px" viewBox="0 0 24 24" fill="none" xmlns="http://www.w3.org/2000/svg">
          <path d="M10 12V17" stroke="#ffffff" stroke-width="1" stroke-linecap="round" stroke-linejoin="round" />
          <path d="M14 12V17" stroke="#ffffff" stroke-width="1" stroke-linecap="round" stroke-linejoin="round" />
          <path d="M4 7H20" stroke="#ffffff" stroke-width="1" stroke-linecap="round" stroke-linejoin="round" />
          <path d="M6 10V18C6 19.6569 7.34315 21 9 21H15C16.6569 21 18 19.6569 18 18V10" stroke="#ffffff"
            stroke-width="1" stroke-linecap="round" stroke-linejoin="round" />
          <path d="M9 5C9 3.89543 9.89543 3 11 3H13C14.1046 3 15 3.89543 15 5V7H9V5Z" stroke="#ffffff" stroke-width="1"
            stroke-linecap="round" stroke-linejoin="round" />
        </svg></button>


      <input type="file" id="importFile" accept=".json" style="display: none;">
    </div>

    <div class="content">

      <div id="snapshotsList"></div>
      <div id="emptyState" class="empty-state">
        <div class="empty-icon"><img src="assets/sleepy_mane.png" alt="" class="sleepy-icon"></div>

        <h1>No Manemark yet</h1>
        <p>Click "Manemark" to capture text from this page</p>
      </div>

    </div>
    <div id="statsContainer"></div>

  </div>

  <!-- Token Limit Modal -->
  <div class="modal-overlay" id="tokenModal">
    <div class="modal-content">
      <h2>Set Token Limit per File</h2>
      <p>Enter the maximum number of tokens per JSON file. Snapshots will be automatically split across files to respect
        this limit.</p>
      <input type="number" id="modalTokenLimit" value="4000" min="500" max="100000" step="500">
      <div class="modal-buttons">
        <button class="btn-cancel" id="modalCancel">Cancel</button>
        <button class="btn-confirm" id="modalConfirm">Export</button>
      </div>
    </div>
  </div>

  <script src="jszip.min.js"></script>
  <script src="popup.js"></script>
</body>

</html>
